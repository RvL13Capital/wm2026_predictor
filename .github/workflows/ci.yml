name: CI

# push limited to main so PR branches don't run every job twice
# (pull_request already covers them).
on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      # v5/v6 are the Node-24-ready majors — GitHub forces Node 24 from
      # 2026-06-16 (mid group stage); bumped pre-freeze so KO-phase CI is quiet.
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      # The 100k-sim wall-clock budget is hardware-dependent and only asserted
      # when WM2026_BENCH=1 (never in CI). The vectorized module still runs:
      # its one-off matrix precompute (~4 min pure Python) dominates job time.
      - name: Run test suite
        run: python -m unittest discover tests -v

      - name: CLI smoke test (engine end-to-end)
        run: |
          python predictor.py --teamA Spain --teamB Qatar --json > /dev/null
          python predictor.py --teamA Croatia --teamB Brazil --phase QF --json > /dev/null
